openapi: 3.0.0
info:
  title: HomeSharing API
  description: REST API для платформы аренды и покупки жилья HomeSharing
  version: "1.0"

tags:
  - name: listings
    description: Публичные объявления
  - name: bookings
    description: Бронирования (гость)
  - name: favorites
    description: Избранное
  - name: host
    description: Кабинет арендодателя
  - name: me
    description: Профиль текущего пользователя
  - name: auth
    description: Аутентификация

paths:
  # ── Listings (public) ──────────────────────────────────────────
  /api/listings:
    get:
      tags: [listings]
      summary: Список объявлений
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: perPage
          schema: { type: integer, default: 12, maximum: 60 }
        - in: query
          name: sort
          schema: { type: string, enum: [new, cheap, expensive, area_desc], default: new }
        - in: query
          name: dealType
          schema: { type: string, enum: [rent_long, rent_short, sale] }
        - in: query
          name: propertyType
          schema: { type: string, enum: [flat, room, house, studio] }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: rooms
          schema: { type: array, items: { type: integer } }
          style: form
          explode: true
        - in: query
          name: priceMin
          schema: { type: number }
        - in: query
          name: priceMax
          schema: { type: number }
        - in: query
          name: areaMin
          schema: { type: number }
        - in: query
          name: areaMax
          schema: { type: number }
        - in: query
          name: q
          schema: { type: string }
          description: Полнотекстовый поиск по названию, адресу, городу, районну, метро
      responses:
        "200":
          description: Список объявлений с пагинацией
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsResponse"

  /api/listings/{id}:
    get:
      tags: [listings]
      summary: Объявление по ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Объявление и похожие
          content:
            application/json:
              schema:
                type: object
                properties:
                  listing:
                    $ref: "#/components/schemas/Listing"
                  similar:
                    type: array
                    items:
                      $ref: "#/components/schemas/Listing"
        "404":
          description: Не найдено

  # ── Bookings (guest) ───────────────────────────────────────────
  /api/bookings:
    get:
      tags: [bookings]
      summary: Мои бронирования
      security: [{ session: [] }]
      responses:
        "200":
          description: Список бронирований гостя
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookingWithListing"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [bookings]
      summary: Создать бронирование
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingInput"
      responses:
        "201":
          description: Бронирование создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Объявление не найдено
        "409":
          description: Даты уже заняты

  /api/bookings/{id}:
    patch:
      tags: [bookings]
      summary: Отменить бронирование
      security: [{ session: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [cancelled]
      responses:
        "200":
          description: Обновлённое бронирование
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: "#/components/schemas/Booking"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Бронирование не найдено

  # ── Favorites ──────────────────────────────────────────────────
  /api/favorites:
    get:
      tags: [favorites]
      summary: Список избранных ID
      security: [{ session: [] }]
      responses:
        "200":
          description: Массив ID объявлений
          content:
            application/json:
              schema:
                type: object
                properties:
                  favorites:
                    type: array
                    items: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [favorites]
      summary: Добавить в избранное
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingId]
              properties:
                listingId: { type: string }
      responses:
        "200":
          description: Добавлено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Объявление не найдено

    delete:
      tags: [favorites]
      summary: Очистить всё избранное
      security: [{ session: [] }]
      responses:
        "200":
          description: Очищено
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/favorites/{listingId}:
    delete:
      tags: [favorites]
      summary: Удалить из избранного
      security: [{ session: [] }]
      parameters:
        - in: path
          name: listingId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Удалено
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Host — listings ────────────────────────────────────────────
  /api/host/listings:
    get:
      tags: [host]
      summary: Мои объявления (хост)
      security: [{ session: [] }]
      responses:
        "200":
          description: Список объявлений хоста
          content:
            application/json:
              schema:
                type: object
                properties:
                  listings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Listing"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [host]
      summary: Создать объявление
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingDraft"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  listing:
                    $ref: "#/components/schemas/Listing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/host/listings/{id}:
    get:
      tags: [host]
      summary: Объявление хоста по ID
      security: [{ session: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Объявление
          content:
            application/json:
              schema:
                type: object
                properties:
                  listing:
                    $ref: "#/components/schemas/Listing"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Не найдено

    put:
      tags: [host]
      summary: Обновить объявление
      security: [{ session: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingDraft"
      responses:
        "200":
          description: Обновлено
          content:
            application/json:
              schema:
                type: object
                properties:
                  listing:
                    $ref: "#/components/schemas/Listing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Не найдено

    delete:
      tags: [host]
      summary: Удалить объявление
      security: [{ session: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Удалено
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Не найдено

  # ── Host — bookings ────────────────────────────────────────────
  /api/host/bookings:
    get:
      tags: [host]
      summary: Заявки на мои объявления
      security: [{ session: [] }]
      responses:
        "200":
          description: Список входящих бронирований
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookingWithListing"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/host/bookings/{id}:
    patch:
      tags: [host]
      summary: Изменить статус заявки
      security: [{ session: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [confirmed, rejected, completed, cancelled]
      responses:
        "200":
          description: Обновлённое бронирование
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: "#/components/schemas/Booking"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Не найдено

  # ── Me ─────────────────────────────────────────────────────────
  /api/me:
    patch:
      tags: [me]
      summary: Обновить роль (isHost)
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isHost]
              properties:
                isHost: { type: boolean }
      responses:
        "200":
          description: Обновлённые флаги пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id: { type: string }
                      isAdmin: { type: boolean }
                      isHost: { type: boolean }
                      isUser: { type: boolean }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/avatar:
    post:
      tags: [me]
      summary: Загрузить аватар
      security: [{ session: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: URL загруженного аватара
          content:
            application/json:
              schema:
                type: object
                properties:
                  image: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags: [me]
      summary: Сбросить аватар
      security: [{ session: [] }]
      responses:
        "200":
          description: Сброшено
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Auth ───────────────────────────────────────────────────────
  /api/signup:
    post:
      tags: [auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                name: { type: string }
      responses:
        "201":
          description: Пользователь создан
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email уже занят

components:
  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: next-auth.session-token

  responses:
    Unauthorized:
      description: Не аутентифицирован
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    Listing:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        dealType:
          type: string
          enum: [rent_long, rent_short, sale]
        propertyType:
          type: string
          enum: [flat, room, house, studio]
        rooms: { type: integer }
        area: { type: number }
        livingArea: { type: number }
        kitchenArea: { type: number }
        floor: { type: integer }
        totalFloors: { type: integer }
        price: { type: number }
        pricePeriod:
          type: string
          enum: [month, day]
          nullable: true
        deposit: { type: number }
        city: { type: string }
        district: { type: string }
        metro: { type: string }
        metroDistanceMin: { type: integer }
        address: { type: string }
        description: { type: string }
        amenities:
          type: array
          items: { type: string }
        images:
          type: array
          items: { type: string }
        rating: { type: number }
        reviewsCount: { type: integer }
        publishedAt: { type: string, format: date-time }
        isVerified: { type: boolean }
        ownerUserId: { type: string, nullable: true }
        owner:
          $ref: "#/components/schemas/ListingOwner"

    ListingOwner:
      type: object
      properties:
        name: { type: string }
        avatar: { type: string }
        type:
          type: string
          enum: [owner, agency]
        phoneMasked: { type: string }

    ListingsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Listing"
        total: { type: integer }
        page: { type: integer }
        perPage: { type: integer }
        totalPages: { type: integer }

    ListingDraft:
      type: object
      required: [title, dealType, propertyType, rooms, area, floor, totalFloors, price, city, address, description]
      properties:
        title: { type: string }
        dealType:
          type: string
          enum: [rent_long, rent_short, sale]
        propertyType:
          type: string
          enum: [flat, room, house, studio]
        rooms: { type: integer }
        area: { type: number }
        livingArea: { type: number }
        kitchenArea: { type: number }
        floor: { type: integer }
        totalFloors: { type: integer }
        price: { type: number }
        pricePeriod:
          type: string
          enum: [month, day]
        deposit: { type: number }
        city: { type: string }
        district: { type: string }
        metro: { type: string }
        metroDistanceMin: { type: integer }
        address: { type: string }
        description: { type: string }
        amenities:
          type: array
          items: { type: string }
        images:
          type: array
          items: { type: string }
        ownerName: { type: string }
        ownerAvatar: { type: string }
        ownerType:
          type: string
          enum: [owner, agency]
        ownerPhone: { type: string }

    Booking:
      type: object
      properties:
        id: { type: string }
        listingId: { type: string }
        guestId: { type: string }
        hostId: { type: string, nullable: true }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        guestsCount: { type: integer }
        totalPrice: { type: number }
        notes: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, confirmed, rejected, completed, cancelled]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    BookingWithListing:
      allOf:
        - $ref: "#/components/schemas/Booking"
        - type: object
          properties:
            listing:
              $ref: "#/components/schemas/Listing"

    CreateBookingInput:
      type: object
      required: [listingId, startDate, endDate]
      properties:
        listingId: { type: string }
        startDate:
          type: string
          format: date
          example: "2025-08-01"
        endDate:
          type: string
          format: date
          example: "2025-08-07"
        guestsCount:
          type: integer
          default: 1
          minimum: 1
        notes:
          type: string
          maxLength: 500
