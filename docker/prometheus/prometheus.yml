global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: homesharing

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: homesharing_app
    static_configs:
      - targets: ["app:3000"]
    metrics_path: /api/metrics
    scheme: http
    params:
      token: ["${METRICS_AUTH_TOKEN}"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:5432"]
    # requires postgres_exporter sidecar in production

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]
    # requires redis_exporter sidecar in production

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics
